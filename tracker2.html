<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" href="simb.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
  <title>Implementation Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .layout { display: flex; height: 100vh; }
    .sidebar {
      width: 200px;
      background-color: #9AB6DE;
      padding-top: 60px;
      transition: width 0.3s ease;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed { width: 60px; }
    .sidebar a {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      text-decoration: none;
      font-size: 18px;
      color: #fff;
      white-space: nowrap;
      transition: background-color 0.2s;
    }
    .sidebar a:hover { background-color: #575757; }
    .sidebar a span:first-child { width: 30px; text-align: center; }
    .sidebar .link-text { opacity: 1; transition: opacity 0.2s ease; }
    .sidebar.collapsed .link-text {
      opacity: 0;
      pointer-events: none;
      width: 0;
      overflow: hidden;
    }
    main {
      flex: 1;
      padding: 20px;
      transition: margin-left 0.3s ease;
      overflow-y: auto;
    }
    .openbtn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1100;
      font-size: 20px;
      cursor: pointer;
      background-color: #9AB6DE;
      color: white;
      padding: 10px 15px;
      border: none;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }
    header {
      background: #9AB6DE;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    main { padding: 2em; }
    .tracker-toolbar .btn { min-width: 210px; }
    #results-table tbody tr { cursor: pointer; }
    #results-table tbody tr.table-active > * {
      box-shadow: inset 0 0 0 9999px rgba(154, 182, 222, 0.18);
    }
    #detalhes-pratica .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px 20px;
    }
    #detalhes-pratica .detail-item {
      background: #fff;
      border: 1px solid #e4e8ee;
      border-radius: 10px;
      padding: 12px 14px;
    }
    #detalhes-pratica .detail-item.full { grid-column: 1 / -1; }
    #detalhes-pratica strong.label {
      display: block;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .empty-state {
      text-align: center;
      padding: 28px 16px;
      color: #6c757d;
    }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
<header>
<button onclick="toggleSidebar()" class="openbtn">☰</button>
<div style="text-align:right; padding:0.5em; font-size:0.9em; color:white">
  👤 <span id="usuario"></span> |
  🌎 <span id="region"></span> |
  🔐 <span id="userlvl"></span>
</div>
</header>

<div class="layout">
  <div id="mySidebar" class="sidebar collapsed">
    <a href="index.html" title="Dashboard"><span><i class="bi bi-speedometer2 text-white"></i></span><span class="link-text">Dashboard</span></a>
    <a href="library.html" title="Library"><span><i class="bi bi-journals text-white"></i></span><span class="link-text">Library</span></a>
    <a href="submission.html" title="Submit"><span><i class="bi bi-upload text-white"></i></span><span class="link-text">Submit</span></a>
    <a href="tracker.html" title="Tracker"><span><i class="bi bi-graph-up-arrow text-white"></i></span><span class="link-text">Implement</span></a>
    <a href="audit.html" title="Audit"><span><i class="bi bi-search text-white"></i></span><span class="link-text">Audit</span></a>
    <a href="admin.html" title="Admin"><span><i class="bi bi-person-gear text-white"></i></span><span class="link-text">Admin</span></a>
    <a href="login.html" title="Login"><span><i class="bi bi-box-arrow-in-right text-white"></i></span><span class="link-text">Login</span></a>
    <a href="mail.html" title="Mensagens"><span><i class="bi bi-envelope-fill text-white"></i></span><span class="link-text">BP Mail</span></a>
    <div class="logout-container">
      <a href="#" id="logoutBtn" title="Logout"><span><i class="bi bi-box-arrow-right text-white"></i></span><span class="link-text">Logout</span></a>
    </div>
  </div>

  <main id="mainContent">
    <section>
      <h2>Implementation Portfolio</h2>

      <form class="row g-3 needs-validation mb-3" novalidate>
        <div class="col-md-3">
          <label class="form-label">Keywords:</label>
          <input id="searchInput" class="form-control" placeholder="Keywords..." type="text"/>
        </div>
        <div class="col-md-3">
          <label for="filter-category" class="form-label">Category:</label>
          <select id="filter-category" class="form-select">
            <option value="">All</option>
          </select>
        </div>
        <div class="col-md-3">
          <label for="filter-status" class="form-label">Status:</label>
          <select id="filter-status" class="form-select">
            <option value="">All</option>
          </select>
        </div>
        <div class="col-md-3">
          <label for="filter-location" class="form-label">Region/Site:</label>
          <select id="filter-location" class="form-select">
            <option value="">All</option>
          </select>
        </div>
      </form>

      <div class="btn-group mb-3 tracker-toolbar" role="group" aria-label="Tracker source selector">
        <button id="btnImplementations" class="btn btn-outline-primary active" type="button">Selected for Implementation</button>
        <button id="btnSubmissions" class="btn btn-outline-primary" type="button">My Submitted Ideas</button>
      </div>

      <table class="table table-hover" id="results-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Site/Region</th>
            <th>Local Responsible</th>
            <th>Category</th>
            <th>Status</th>
            <th>Files</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <div id="detalhes-pratica" class="mt-4" style="display:none;">
      <h3>Best Practice Details</h3>
      <div class="detail-grid">
        <div class="detail-item"><strong class="label">Title</strong><span id="detalhe-title"></span></div>
        <div class="detail-item"><strong class="label">Category</strong><span id="detalhe-category"></span></div>
        <div class="detail-item"><strong class="label">Region/Site</strong><span id="detalhe-region_plant"></span></div>
        <div class="detail-item"><strong class="label">Responsible</strong><span id="detalhe-responsible"></span></div>
        <div class="detail-item"><strong class="label">Status</strong><span id="detalhe-status"></span></div>
        <div class="detail-item full"><strong class="label">Description</strong><span id="detalhe-desc"></span></div>
        <div class="detail-item full"><strong class="label">Steps</strong><span id="detalhe-steps"></span></div>
        <div class="detail-item full"><strong class="label">Comments</strong><span id="detalhe-comentario"></span></div>
      </div>
      <div id="acoes" class="mt-3"></div>
    </div>
  </main>
</div>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById("mySidebar");
  sidebar.classList.toggle("collapsed");
}
</script>

<script type="module">
  import { supabase } from './supabase-client.js';
  import { getLoggedUser, getUserData, carregarDadosUsuario } from './user-info.js';

  const tableBody = document.querySelector('#results-table tbody');
  const detailsBox = document.getElementById('detalhes-pratica');
  const searchInput = document.getElementById('searchInput');
  const categoryFilter = document.getElementById('filter-category');
  const statusFilter = document.getElementById('filter-status');
  const locationFilter = document.getElementById('filter-location');
  const btnImplementations = document.getElementById('btnImplementations');
  const btnSubmissions = document.getElementById('btnSubmissions');

  let currentView = 'implementations';
  let selectedImplementations = [];
  let mySubmissions = [];
  let visibleData = [];
  let activeKey = null;
  let activeRow = null;
  let currentUser = null;
  let currentUserData = null;

  function normalize(value) {
    return (value || '').toString().trim();
  }

  function clearDetails() {
    activeKey = null;
    if (activeRow) activeRow.classList.remove('table-active');
    activeRow = null;
    detailsBox.style.display = 'none';
    document.getElementById('acoes').innerHTML = '';
  }

  function fillSelect(selectEl, values) {
    const current = selectEl.value;
    selectEl.innerHTML = '<option value="">All</option>';
    [...new Set(values.map(normalize).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b))
      .forEach(value => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        selectEl.appendChild(opt);
      });
    selectEl.value = [...selectEl.options].some(o => o.value === current) ? current : '';
  }

  function getCurrentDataset() {
    return currentView === 'implementations' ? selectedImplementations : mySubmissions;
  }

  function applyFilters() {
    const dataset = getCurrentDataset();
    const keyword = normalize(searchInput.value).toLowerCase();
    const category = normalize(categoryFilter.value);
    const status = normalize(statusFilter.value);
    const location = normalize(locationFilter.value);

    visibleData = dataset.filter(item => {
      const haystack = [
        item.title,
        item.description,
        item.category,
        item.region_plant,
        item.responsible,
        item.ImpResp,
        item.status
      ].map(v => normalize(v).toLowerCase()).join(' ');

      const itemCategory = normalize(item.category);
      const itemStatus = normalize(item.status);
      const itemLocation = normalize(item.region_plant);

      return (!keyword || haystack.includes(keyword)) &&
             (!category || itemCategory === category) &&
             (!status || itemStatus === status) &&
             (!location || itemLocation === location);
    });

    renderTable();
  }

  function refreshFilters() {
    const dataset = getCurrentDataset();
    fillSelect(categoryFilter, dataset.map(item => item.category));
    fillSelect(statusFilter, dataset.map(item => item.status));
    fillSelect(locationFilter, dataset.map(item => item.region_plant));
  }

  function renderTable() {
    tableBody.innerHTML = '';

    if (!visibleData.length) {
      tableBody.innerHTML = '<tr><td colspan="7" class="empty-state">No records found for the selected filters.</td></tr>';
      clearDetails();
      return;
    }

    visibleData.forEach(item => {
      const row = document.createElement('tr');
      const itemKey = `${currentView}-${item.id}`;
      row.dataset.key = itemKey;

      const responsible = currentView === 'implementations'
        ? normalize(item.ImpResp || item.responsible)
        : normalize(item.responsible);

      const fileCell = item.file_url
        ? `<a href="${item.file_url}" target="_blank">Download</a>`
        : '';

      const actionCell = currentView === 'implementations'
        ? `<button class="btn btn-primary btn-sm js-remove" data-id="${item.id}" title="Delete"><i class="bi bi-x-lg"></i></button>`
        : '<span class="text-muted">—</span>';

      row.innerHTML = `
        <td>${normalize(item.title)}</td>
        <td>${normalize(item.region_plant)}</td>
        <td>${responsible}</td>
        <td>${normalize(item.category)}</td>
        <td>${normalize(item.status)}</td>
        <td>${fileCell}</td>
        <td>${actionCell}</td>
      `;

      if (activeKey === itemKey) {
        row.classList.add('table-active');
        activeRow = row;
      }

      row.addEventListener('click', () => toggleDetails(item, row, itemKey));
      tableBody.appendChild(row);
    });

    tableBody.querySelectorAll('.js-remove').forEach(button => {
      button.addEventListener('click', async event => {
        event.stopPropagation();
        const id = button.dataset.id;
        await removerAtividade(id);
      });
    });
  }

  function toggleDetails(item, row, itemKey) {
    if (activeKey === itemKey) {
      clearDetails();
      return;
    }

    if (activeRow) activeRow.classList.remove('table-active');
    row.classList.add('table-active');
    activeRow = row;
    activeKey = itemKey;

    document.getElementById('detalhe-title').innerText = normalize(item.title);
    document.getElementById('detalhe-category').innerText = normalize(item.category);
    document.getElementById('detalhe-desc').innerText = normalize(item.description);
    document.getElementById('detalhe-steps').innerText = normalize(item.steps);
    document.getElementById('detalhe-region_plant').innerText = normalize(item.region_plant);
    document.getElementById('detalhe-responsible').innerText = normalize(currentView === 'implementations' ? (item.ImpResp || item.responsible) : item.responsible);
    document.getElementById('detalhe-status').innerText = normalize(item.status);
    document.getElementById('detalhe-comentario').innerText = normalize(item.comments || item.auditor_comment);

    const actions = document.getElementById('acoes');
    actions.innerHTML = '';

    if (currentView === 'implementations') {
      const status = normalize(item.status).toLowerCase();
      if (status !== 'in process') {
        actions.innerHTML = `<button class="btn btn-success" id="btnImplement">Implement</button>`;
        document.getElementById('btnImplement').addEventListener('click', () => iniciarImplementacao(item.id));
      } else {
        actions.innerHTML = `
          <div class="mb-3">
            <label class="form-label">Comments:</label>
            <textarea id="comentarios-${item.id}" class="form-control" rows="3" placeholder="Write here..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Files:</label>
            <input id="anexo-${item.id}" type="file" class="form-control">
          </div>
          <button class="btn btn-primary me-2" id="btnSubmitImplementation">Submit</button>
          <button class="btn btn-secondary" id="btnCancelImplementation">Cancel</button>
        `;
        document.getElementById('btnSubmitImplementation').addEventListener('click', () => submeterImplementacao(item.id));
        document.getElementById('btnCancelImplementation').addEventListener('click', () => cancelaImplementacao(item.id));
      }
    }

    detailsBox.style.display = 'block';
  }

  async function loadImplementations() {
    const { data, error } = await supabase
      .from('atividades_selecionadas')
      .select('*')
      .eq('imp_plant', currentUserData.site_region)
      .order('id', { ascending: false });

    if (error) {
      console.error('Error loading selected ideas:', error);
      selectedImplementations = [];
      return;
    }

    selectedImplementations = data || [];
  }

  async function loadMySubmissions() {
    const { data, error } = await supabase
      .from('submissions')
      .select('*')
      .eq('responsible', currentUser.email)
      .order('id', { ascending: false });

    if (error) {
      console.error('Error loading user submissions:', error);
      mySubmissions = [];
      return;
    }

    mySubmissions = data || [];
  }

  async function removerAtividade(id) {
    const { error } = await supabase
      .from('atividades_selecionadas')
      .delete()
      .eq('id', id);

    if (error) {
      console.error('Erro ao remover:', error);
      alert('Error removing best practice.');
      return;
    }

    clearDetails();
    await loadImplementations();
    refreshFilters();
    applyFilters();
    alert('Best Practice removed!');
  }

  async function iniciarImplementacao(id) {
    const { error } = await supabase
      .from('atividades_selecionadas')
      .update({ status: 'In Process' })
      .eq('id', id);

    if (error) {
      alert('Error starting implementation.');
      return;
    }

    clearDetails();
    await loadImplementations();
    refreshFilters();
    applyFilters();
    alert('Implementation Started!');
  }

  async function cancelaImplementacao(id) {
    const { error } = await supabase
      .from('atividades_selecionadas')
      .update({ status: 'Aborted' })
      .eq('id', id);

    if (error) {
      alert('Error canceling implementation.');
      return;
    }

    clearDetails();
    await loadImplementations();
    refreshFilters();
    applyFilters();
    alert('Canceled!');
  }

  async function submeterImplementacao(id) {
    const comentarios = document.getElementById(`comentarios-${id}`)?.value || '';
    const arquivo = document.getElementById(`anexo-${id}`)?.files?.[0];
    const type = 'Implementation Submission';
    let fileUrl = null;

    if (arquivo) {
      const fileName = `${Date.now()}_${arquivo.name}`;
      const { error: uploadError } = await supabase.storage.from('implementfiles').upload(fileName, arquivo);
      if (uploadError) {
        alert('Error uploading file: ' + uploadError.message);
        return;
      }
      const { data } = supabase.storage.from('implementfiles').getPublicUrl(fileName);
      fileUrl = data.publicUrl;
    }

    const payload = { comments: comentarios, status: 'Submitted', type };
    if (fileUrl) payload.file_url = fileUrl;

    const { error } = await supabase
      .from('atividades_selecionadas')
      .update(payload)
      .eq('id', id);

    if (error) {
      alert('Error saving implementation: ' + error.message);
      return;
    }

    clearDetails();
    await loadImplementations();
    refreshFilters();
    applyFilters();
    alert('Implementation Submitted!');
  }

  function switchView(view) {
    currentView = view;
    btnImplementations.classList.toggle('active', view === 'implementations');
    btnSubmissions.classList.toggle('active', view === 'submissions');
    clearDetails();
    refreshFilters();
    applyFilters();
  }

  async function initPage() {
    await carregarDadosUsuario();
    currentUser = await getLoggedUser();
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    currentUserData = await getUserData(currentUser.email);
    if (!currentUserData) return;

    await Promise.all([loadImplementations(), loadMySubmissions()]);
    refreshFilters();
    applyFilters();
  }

  searchInput.addEventListener('input', applyFilters);
  categoryFilter.addEventListener('change', applyFilters);
  statusFilter.addEventListener('change', applyFilters);
  locationFilter.addEventListener('change', applyFilters);
  btnImplementations.addEventListener('click', () => switchView('implementations'));
  btnSubmissions.addEventListener('click', () => switchView('submissions'));

  document.getElementById('logoutBtn').addEventListener('click', async event => {
    event.preventDefault();
    const { error } = await supabase.auth.signOut();
    if (error) {
      console.error('Erro ao fazer logout:', error.message);
      return;
    }
    window.location.href = 'login.html';
  });

  initPage();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
